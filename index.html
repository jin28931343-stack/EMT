<script>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        
        const Icon = ({ name, size = 24, className, ...props }) => {
            const iconName = name.charAt(0).toUpperCase() + name.slice(1);
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className} {...props}></i>;
        };
 // --- 修改後的元件：字體大小控制器 (右下角懸浮，縮小50%) ---
        const FontSizeControl = () => {
            const [fontSize, setFontSize] = useState(16); // 預設 16px
            const [isVisible, setIsVisible] = useState(false);
            const timeoutRef = React.useRef(null);

            // 當 fontSize 改變時，更新 HTML 根元素的字體大小
            useEffect(() => {
                document.documentElement.style.fontSize = `${fontSize}px`;
            }, [fontSize]);

            // 喚醒控制器並設定自動隱藏的計時器
            const resetTimer = React.useCallback(() => {
                setIsVisible(true);
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                // 設定 3 秒後自動消失
                timeoutRef.current = setTimeout(() => {
                    setIsVisible(false);
                }, 3000);
            }, []);

            // 監聽全域事件 (滾動、點擊、觸摸)
            useEffect(() => {
                window.addEventListener('scroll', resetTimer);
                window.addEventListener('click', resetTimer);
                window.addEventListener('touchstart', resetTimer);
                
                resetTimer(); // 初始化時先顯示一下

                return () => {
                    window.removeEventListener('scroll', resetTimer);
                    window.removeEventListener('click', resetTimer);
                    window.removeEventListener('touchstart', resetTimer);
                    if (timeoutRef.current) clearTimeout(timeoutRef.current);
                };
            }, [resetTimer]);

            const handleIncrease = (e) => {
                e.stopPropagation();
                resetTimer();
                setFontSize(prev => Math.min(prev + 2, 24));
            };

            const handleDecrease = (e) => {
                e.stopPropagation();
                resetTimer();
                setFontSize(prev => Math.max(prev - 2, 14));
            };

            const handleReset = (e) => {
                e.stopPropagation();
                resetTimer();
                setFontSize(16);
            };

            return (
                <div className={`
                    fixed right-2 bottom-12 z-40 flex flex-col gap-2 p-1 transition-opacity duration-500 ease-in-out
                    ${isVisible ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}
                `}>
                    {/* 加大按鈕 (尺寸縮小為 w-6 h-6, icon size 14) */}
                    <button 
                        onClick={handleIncrease} 
                        className="w-6 h-6 rounded-full bg-black/20 backdrop-blur-[2px] text-white flex items-center justify-center shadow-sm active:bg-blue-600/60 transition-all"
                    >
                        <Icon name="plus" size={14} />
                    </button>
                    
                    {/* 顯示比例 */}
                    <button 
                        onClick={handleReset}
                        className="w-6 h-6 rounded-full bg-black/20 backdrop-blur-[2px] text-white flex flex-col items-center justify-center shadow-sm active:bg-blue-600/60 transition-all"
                    >
                        <span className="text-[9px] font-bold text-white/90">{Math.round((fontSize/16)*100)}%</span>
                    </button>

                    {/* 縮小按鈕 */}
                    <button 
                        onClick={handleDecrease} 
                        className="w-6 h-6 rounded-full bg-black/20 backdrop-blur-[2px] text-white flex items-center justify-center shadow-sm active:bg-blue-600/60 transition-all"
                    >
                        <Icon name="minus" size={14} />
                    </button>
                </div>
            );
        };
                // --- 新增元件：可縮放圖片 (修改：按鈕縮小50%、右下角、自動隱藏) ---
        const ZoomableImage = ({ src, alt, className }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [zoomLevel, setZoomLevel] = useState(1);
            // 新增控制列顯示狀態
            const [showControls, setShowControls] = useState(true);
            const controlsTimeoutRef = React.useRef(null);

            // 喚醒控制器並設定自動隱藏
            const resetControlsTimer = React.useCallback(() => {
                setShowControls(true);
                if (controlsTimeoutRef.current) clearTimeout(controlsTimeoutRef.current);
                // 設定 3 秒後自動消失
                controlsTimeoutRef.current = setTimeout(() => {
                    setShowControls(false);
                }, 3000);
            }, []);

            const handleOpen = (e) => {
                e.stopPropagation(); // 防止觸發折疊收合
                setIsOpen(true);
                setZoomLevel(1);
                setShowControls(true);
                document.body.style.overflow = 'hidden'; // 鎖定背景滾動
            };

            const handleClose = (e) => {
                e.stopPropagation();
                setIsOpen(false);
                document.body.style.overflow = ''; // 解除鎖定
            };

            const handleZoomIn = (e) => {
                e.stopPropagation();
                resetControlsTimer();
                setZoomLevel(prev => Math.min(prev + 0.5, 4)); // 最大放大 4 倍
            };

            const handleZoomOut = (e) => {
                e.stopPropagation();
                resetControlsTimer();
                setZoomLevel(prev => Math.max(prev - 0.5, 1)); // 最小 1 倍
            };

            // 監聽互動 (滑鼠移動或觸摸) 以顯示控制列
            const handleInteraction = () => {
                resetControlsTimer();
            };

            return (
                <>
                    {/* 原圖 (點擊開啟) */}
                    <img 
                        src={src} 
                        alt={alt} 
                        className={`${className} cursor-pointer hover:opacity-95 transition-opacity`}
                        onClick={handleOpen}
                    />
                    
                    {/* 全螢幕縮放遮罩 (Portal 到 body) */}
                    {isOpen && ReactDOM.createPortal(
                        <div 
                            className="fixed inset-0 z-[9999] bg-black/95 flex flex-col animate-fade-in-up" 
                            onClick={handleClose}
                            onMouseMove={handleInteraction}
                            onTouchStart={handleInteraction}
                        >
                            {/* 頂部關閉鈕 (也加入自動隱藏效果) */}
                            <div className={`absolute top-0 left-0 right-0 p-4 flex justify-end items-center z-50 pointer-events-none transition-opacity duration-500 ${showControls ? 'opacity-100' : 'opacity-0'}`}>
                                <button 
                                    onClick={handleClose} 
                                    className="pointer-events-auto bg-black/20 text-white/80 hover:text-white rounded-full p-2 backdrop-blur-[2px] transition-all"
                                >
                                    <Icon name="x" size={32} />
                                </button>
                            </div>

                            {/* 圖片容器 (支援原生滾動) */}
                            <div className="flex-1 w-full h-full overflow-auto flex items-center justify-center p-2" onClick={(e) => e.stopPropagation()}>
                                <img 
                                    src={src} 
                                    alt={alt}
                                    style={{ 
                                        width: zoomLevel === 1 ? 'auto' : `${zoomLevel * 100}%`,
                                        maxWidth: zoomLevel === 1 ? '100%' : 'none',
                                        maxHeight: zoomLevel === 1 ? '100%' : 'none',
                                        transform: zoomLevel === 1 ? 'none' : 'scale(1)', // 確保重繪
                                    }}
                                    className="object-contain transition-all duration-200 ease-out"
                                />
                            </div>

                            {/* 底部右側控制列 (右下角、垂直、縮小50%、自動隱藏) */}
                            <div className={`
                                absolute bottom-8 right-6 flex flex-col gap-2 z-50 pointer-events-auto items-center transition-opacity duration-500 ease-in-out
                                ${showControls ? 'opacity-100' : 'opacity-0 pointer-events-none'}
                            `}>
                                {/* 放大 */}
                                <button 
                                    onClick={handleZoomIn}
                                    className={`w-6 h-6 rounded-full bg-black/20 backdrop-blur-[2px] text-white flex items-center justify-center shadow-sm transition-all ${zoomLevel >= 4 ? 'opacity-30 cursor-not-allowed' : 'active:bg-blue-600/60'}`}
                                    disabled={zoomLevel >= 4}
                                >
                                    <Icon name="plus" size={14} />
                                </button>
                                
                                {/* 比例顯示 */}
                                <div className="flex items-center justify-center">
                                    <span className="text-white/90 font-mono font-bold text-[9px] drop-shadow-md">
                                        {Math.round(zoomLevel * 100)}%
                                    </span>
                                </div>

                                {/* 縮小 */}
                                <button 
                                    onClick={handleZoomOut}
                                    className={`w-6 h-6 rounded-full bg-black/20 backdrop-blur-[2px] text-white flex items-center justify-center shadow-sm transition-all ${zoomLevel <= 1 ? 'opacity-30 cursor-not-allowed' : 'active:bg-blue-600/60'}`}
                                    disabled={zoomLevel <= 1}
                                >
                                    <Icon name="minus" size={14} />
                                </button>
                            </div>
                        </div>,
                        document.body
                    )}
                </>
            );
        };                   
        // --- 資料數據 ---
        const guidelinesData = [
            // === 壹、依據 ===
            {
                id: 'law-basis',
                category: '壹、依據',
                code: 'Law',
                title: '法規依據',
                keywords: ['依據', '緊急醫療救護法', '作業程序', '法規'],
                content: [
                '「緊急醫療救護法」第二十七條規定：救護技術員應依緊急病人救護作業程序，施行救護。前項緊急病人救護作業程序，由直轄市、縣(市)衛生主管機關定之。',
                '臺南市緊急病人救護作業程序第十三條規定：緊急病人現場救護，應依本府消防局救護技術員緊急救護標準作業流程暨步驟手冊規定辦理。',
                '每次救護均有其特異性，因此救護技術員仍應視緊急病人之狀況、現場環境、救護人力與器材裝備等因素進行最適當的緊急救護處置。'
                ],
                note: '本指引為執行緊急救護之準則，遇特殊狀況應以病人最大利益為考量。'
            },

            // === 貳、緊急救護作業程序 ===
            {
                id: 'sec-2-main',
                category: '貳、緊急救護作業程序',
                code: 'Procedure',
                title: '緊急救護作業程序',
                keywords: ['貳', '作業程序', '參考流程', '預立醫囑', '名詞符號'],
                isParent: true,

                            '到院前救護流程均包含「現場評估」通用流程、「非外傷或外傷」通用流程、「車內照護」通用流程與到院「病人交接」通用流程。救護技術員到達現場後應先引用「現場評估」通用流程，從自我保護到評估是否需要動員更大救護能量依序進行，並判斷救護案件屬「非外傷」或「外傷」而進入「非外傷」通用流程或「外傷」通用流程。在檢查意識、問主訴時即可依病人最主要或最嚴重之症狀進一步選用適當流程，如主訴呼吸困難病人建議採用「呼吸困難」流程；亦可在評估過程中依據傷勢判斷或鑑別診斷結果採用適當流程，例如病人因外傷事件導致肢體骨折則可採用「肢體骨折」流程予以適當處置。上救護車後即進入車內照護時期，應遵循「車內照護」通用流程照護病人。',
                            '診所之緊急病人轉送中如有醫護人員隨行，可由其協助照護病人，惟其所為處置如超出本局作業參考指引之範圍時，應將其處置內容明載於救護紀錄表，以釐清責任歸屬。具備高級救護技術員資格者除依本參考指引所授權之範圍使用藥物外，不得有其他給藥之行為，亦不得將所授權之藥品提供給任何人使用。',
                            '執行救護流程時，若無法決定病人病情應適用何種救護參考流程時，應立即尋求線上醫療指導，並依線上醫療指導之指引處置病人，後續依「緊急醫療救護法施行細則」第九條規定將醫師指示內容填註於救護紀錄表。'
                        ], 
                        note: ''
                    },
                    {
                        id: 'proc-2-order',
                        title: '預立醫囑與線上醫療指導申請',
                        type: 'text',

                        scrollable: false, 
                        content: [
                            '【預立醫囑】',
                            '1. 救護技術員依其等級得執行本作業參考指引所規範之處置及預立醫囑。',
                            '2. 高級救護技術員依預立醫囑進行之救護技術及藥物處置，於本作業參考指引以 [P] 標記。',
                            ' ',
                            '【線上醫療指導申請之條件】',
                            '1. 高級救護項目之執行，依照本作業流程規範，需取得線上醫療指導許可，於本作業參考指引以「*」標記。',
                            '2. 緊急救護中，有醫療或倫常疑義，救護技術員與救護派遣員均無法解決時。',

                            '1. 救護技術員應儘量彙集現場與病人完整情況，申請線上醫療指導。',
                            '2. 線上醫療指導員應依救護技術員報告，與本地之緊急醫療救護水準，依照標準作業流程提供適切之醫療指導。',
                            '3. 救護技術員需將線上指導內容詳實填註於救護紀錄表，並交由醫療指導醫師核簽。',
                            '4. 救護技術員應遵循線上醫療指導，並於返隊後視情況製作案例，或醫療指導醫師至分隊或其他救護研習場合時報告。',
                            ' ',
                            '【線上醫療指導之申請與通訊方式】',
                            '1. 使用電話撥打指揮中心，請中心聯絡醫療指導醫師，開啟三方通話並且由指揮中心端錄音相關資訊。',
                            '2. 使用救護平板於線上指導群組，尋求醫療指導醫師，並可視情況開啟視訊通話。'

                        note: ''
                    },

                            '（二）救護對象之定義：',

                            '（三）流程或原則之編碼原則：',

                        image: 'PIC/standard.png',

                    }
                ]
            },

            // === 參、緊急救護作業流程 (含 C1-C6, M1-M14, T1-T7, S1-S9, S10) ===

                                    '註10：',

                                    '　4). 頭頸或軀幹(含腹鼠蹊部)之開放性傷口、上臂或大腿之穿刺傷或重物輾壓傷。',
                                    '　5). 嚴重骨折：>1處長骨骨折、連枷胸、骨盆骨折、開放性或凹陷性顱骨骨折。',

                                    '　9). 高能量機轉：',
                                    '　(1). 交通事故',

                                    '　　III. 高速撞擊之事故：下列狀況應考慮屬高能量機轉。',

                            {
                                id: 'C4',
                                code: 'C4',
                                title: '「車內照護」通用流程',
                                image: 'PIC/C4_transport.png',
                                content: [
                                    '註 1：持續心肺復甦術與監測',
                                    '1. 原則上心肺功能停止病人若於現場已接受電擊，開車前建議再次分析心律以決定是否需要再次電擊。',
                                    '2. 初、中級救護技術員應於 CPR 每 5 循環或約 2 分鐘檢查脈搏以決定是否繼續 CPR，如有自動心肺復甦機，可視情況使用。高級救護隊救護技術員得視需要及裝備 (自動心肺復甦機、可攜式急救呼吸器、可攜式心臟電擊器及生理監視器) 監測心律、執行急救，在 CPR 約 2 分鐘後建議先分析心律再決定後續處置。',
                                    '3. 自動心肺復甦機、可攜式急救呼吸器、可攜式心臟電擊器及生理監視器等裝備操作，請參照各廠牌使用規範。',
                                    '註 2：生命徵象不穩定的數值包含：意識、呼吸、脈搏、血壓、瞳孔、體溫、膚色、血氧濃度，病人有新狀況發生時應重新評估。',
                                    '1. 生命徵象不穩定係指',
                                    '　1). 急性意識不清 (GCS<14)。',
                                    '　2). 呼吸：≥30 次/分或<10 次/分。',
                                    '　3). 脈搏：≥150 次/分或<50 次/分。',
                                    '　4). 收縮壓>220mmHg 或<90mmHg。',
                                    '　5). 微血管充填時間>2 秒。',
                                    '　6). SpO2<90%。',
                                    '　7). 體溫：>41℃或<32°C。',
                                    '2. 評估後之處置包括：',
                                    '　1). 呼吸道處置：抽吸、口咽、鼻咽輔助呼吸道或進階呼吸道，異物哽塞排除請參閱 M2 流程。',
                                    '　2). 氧氣治療：鼻導管氧氣、面罩氧氣、非再吸入型氧氣面罩及 BVM 人工呼吸。',
                                    '　3). 靜脈注射：無禁忌症下使用 (限中級以上救護技術員操作)。',
                                    '　4). 控制外出血。',
                                    '　5). 車上發現 OHCA 時，請於安全處所停車，並參考 [C6 心肺功能停止] 相關急救處置。',
                                    '註 3：次級評估包括生命徵象評估與身體檢查',
                                    '1. 救護技術員在次級評估後可給予的相關處置至少包括：',
                                    '　1). 氣喘或慢性阻塞性肺病之處置：無禁忌症下協助使用短效型支氣管擴張劑。',
                                    '　2). 缺血性胸痛之處置：經同意下施做 12 導程心電圖，無禁忌症下協助或給予硝化甘油舌下含片。',
                                    '　3). 低血糖之處置：給予糖粉、含糖口服液 (懷疑低血糖者或以血糖機證實為低血糖者) 或含 5% 或 10% 葡萄糖之靜脈輸液 (證實為低血糖者，限中級以上救護技術員操作)。',
                                    '　4). 中暑之處置：降溫 (包括於後頸部、腋下及鼠蹊部放置冰枕或冰敷包，上車後將冷氣開至最大等)。',
                                    '　5). 低體溫之處置：保暖。',
                                    '　6). 外傷病人之處置：',
                                    '　　(1). 清洗傷口。',
                                    '　　(2). 包紮止血：小且無持續性之出血或危急個案可在救護車上處置。',
                                    '　　(3). 燒燙傷處置：危急個案或小面積燒燙傷可在救護車上處置。',
                                    '註 4：抵達醫院前，後座的救護技術員應持續監測病人情況',
                                    '1. 心肺功能停止病人相關監測，見註 1',
                                    '2. 非心肺功能停止病人，生命徵象監測間隔建議如下：',
                                    '　1). 危急個案每隔 3-5 分鐘測量一次。',
                                    '　2). 非危急個案至多每隔 15 分鐘測量 1 次。',
                                    '　3). 當病人生命徵象惡化時須重新初級評估，並給予急救或必要處置。'

                                content: [
                                    '註 1：',
                                    '1. 到達急診前 50-100 公尺時，得視交通情形關閉或調低警鳴器。',
                                    '2. 點選到院時間或回報救災救護指揮中心到達醫院。',
                                    '註 2：下救護車應注意事項：',
                                    '1. 除非病人要求自行下車，救護技術員應讓病人躺在擔架床上，兩人共同執行小心將其由後車門移出。病人要求自行下車時，救護技術員亦應在旁保護並引導其從側門下車。',
                                    '2. 考量病人之呼吸狀況，必要時 (如實施 CPR 或進行 BVM 人工呼吸...等) 可延伸到院前急救處置及氧氣設備 (如攜帶 3 合 1 氧氣組) 至急救室內，病人交接後才可移除氧氣。',
                                    '註 3：',
                                    '1. 若病人生命徵象穩定，救護技術員應根據檢傷護理人員或急診室醫師之需要，對上述人員做病情交接。',
                                    '2. 若病人生命徵象不穩定、懷疑嚴重外傷、急性心肌梗塞或符合 3 小時內急性腦中風者，救護技術員應主動向檢傷護理人員或急診室醫師做病情交接。',
                                    '3. 病情交接內容：',
                                    '　1). 救護技術員人員自我介紹：分隊別及救護技術員名字。',
                                    '　2). 現場病人病況：',
                                    '　　(1). 病人資料：姓名，性別及年齡。',
                                    '　　(2). 非外傷病人病況交接 (ISBAR 交班)：',
                                    '- Introduction/Invitation/ Initiation：建立關係-自介、邀請、急迫性',
                                    '- Situation：主訴、過去相關病史',
                                    '- Background：過去病史及現病史與背景',
                                    '- Assessment：評估、初步臆斷 (血氧濃度、CRT>兩秒)',
                                    '- Re-evaluation：重要處置、再評估',
                                    '　　(3). 外傷病人病況交接 (IMIST 交班)：',
                                    '- I (Identification)：身分確認',
                                    '- M (Mechanism)：受傷機轉',
                                    '- I (Injury)：已發現傷害',
                                    '- S (Signs & Symptoms)：症狀',
                                    '- T (Treatments)：已做之處置',
                                    '　3). 救護技術員的評估：',
                                    '　　(1). 病人生命徵象。',
                                    '　　(2). 身體評估發現。',
                                    '　4). 救護技術員的緊急處置及回應：',
                                    '　　(1). 救護技術員給予的治療及病人反應。',
                                    '　　(2). 救護技術員對急診醫護人員疑問的回答。',
                                    '註 4：若有財物需交接，救護技術員應與醫院指定人員 (如警衛、檢傷護理人員或急救室護理人員等) 進行財物交接，點收無誤後應與交接人員完成簽收程序。',

                                    '1. 救護技術員於現場處置病人之醫療廢棄物 (如紗布、手套、生理食鹽水、包裝袋等)，得放置於一般垃圾袋及感染性垃圾袋攜至救護車上集中處置，避免丟棄於現場，並於到達醫院後，將醫療廢棄物丟至醫院染污處置筒，若無染污之垃圾，應分類丟棄。',

                            {
                                id: 'C6',
                                code: 'C6',
                                title: '「心肺功能停止」流程',
                                image: 'PIC/C6_ohca.png',        // 第一張圖維持 image
                                image2:'PIC/C6_ohca1.png',      // 第二張圖請改名為 image2
                                bottomImage: 'PIC/igel.png',
                                bottomImage2: 'PIC/babyOHCA.png',
                                content: [
                                    '註 1：心肺復甦術摘要表 (專業版)',
                                    '詳細 CPR 步驟請參照：臺南市政府消防局心肺復甦術摘要表 (2020 AHA Guidelines)。',
                                    '重點摘要：',
                                    '1. 按壓位置：胸部正中央 (胸骨下半部)。',
                                    '2. 按壓深度：成人 5~6 公分；兒童約 5 公分；嬰兒約 4 公分。',
                                    '3. 按壓速率：100~120 次/分。',
                                    '4. 孕婦 OHCA 急救要領：',
                                    '　1). 若有足夠救護技術員，可令病人平躺並由一人將病人子宮推向左側。',
                                    '　2). 若急救人數不足時，可將病人擺成左側躺 (27°-30°) 姿勢。',
                                    '註 2：',
                                    '1. 若現場已啟用 PAD(公共場所設置自動體外心臟電擊去顫器)，不論現場有無電擊，救護技術員到場均                                         可在不影響 CPR 急救下更換消防局 AED，以利監測病人心地。另外當病人 OHCA 時，不論離院遠近均需依照本程序進行 BLS+AED 操作。',
                                    '2. 非外傷 OHCA 病人一律使用 AED；外傷 OHCA 病人並不強制使用 AED，考量止血及快速後送優先，必須注意，若外傷機轉或嚴重度不足以造成心肺停止(例如只有小腿受傷)，或者是其他跡象顯示受傷之前可能曾發生非外傷疾病像是心因性問題導致(例如根據同車乘客的敘述，司機曾說胸痛並冒冷汗，之後便喪失意識，以致車輛失控而發生車禍)，那麼，該 OHCA 病人很可能是非外傷原因所造成，救護技術員應使用 AED。',
                                    '3. 小兒 OHCA 應優先使用小兒貼片並依照廠牌圖片指示黏貼，如果無小兒貼片，應考慮使用成人貼片。',
                                    '註 3：',
                                    '1. 中級救護技術員以上建立周邊輸液管路，最多嘗試 2 次(由現場救護技術員判斷需施打 IV 或 IO 皆可， 若 T2 經受過訓練後，可於 TP 指導下協助 IO 施打)。建立周邊輸液管路的步驟不應阻礙或延遲 CPR/AED。',
                                    '2. [P]高級救護技術員可使用氣管內管插管建立確切呼吸道，最多嘗試 1 次；中級救護技術員以上可用聲門上呼吸道建立進階呼吸道，最多嘗試 1 次。但因病人生理構造導致聲門上呼吸道號數不符，可以更換適當號數再嘗試置入，最多嘗試 1 次。建立呼吸道的步驟不應阻礙或延遲 CPR/AED。最終以兩次為限。如無法改善，則考慮輔助呼吸道並盡速送醫。小兒病人如無法建立進階呼吸道，則應考慮建立輔助呼吸道。',
                                    '3. [P]高級救護技術員於成人 OHCA 案件中，可使用 Epinephrine (1mg/IVP)，每 3~5 分鐘重複給予；在周邊輸液管路未能順利建立下，若已建立氣管內管插管，可由氣管內管（ENDO）給予 Epinephrine(2-2.5mg)用 5~10CC 蒸餾水或生理食鹽水稀釋注入氣管內管，再快速擠壓袋瓣罩甦醒球五次。',
                                    '4. [P]在小兒 OHCA 案件中，如果建立周邊輸液管路(IV/IO)，Epinephrine 可使用生理食鹽水稀釋 10 倍(1:10000)(先抽 1cc Epinephrine，再抽稀釋液至 10ml)，依病人體重給予 0.1ml/kg ( 0.01mg/kg)；如果有放置氣管內管，Epinephrine 濃度 1:1000(未稀釋)，3-5ml 食鹽水稀釋注入氣管內管，再快速擠壓袋瓣罩甦醒球五次。',
                                    '5. [P]遇頑固型無脈 VT 或 Vf 時(經電擊三次未成功)，可給予 Amiodarone，第一次劑量為 300mg，IVP，第二次劑量為 150mg，IVP，應與 Epinephrine 的給予錯開(建議為 AED 再次分析及電擊後)。',
'例: Amiodarone300mg-IVP/Epinephrine 1mg-IVP/ Amiodarone150mg-IVP，時間間隔 2 分鐘。',
                                    '6. [P]遇頑固性無脈 VT 或 VF 藥物均無效下由現場 TP 判斷是否嘗試兩台電擊器雙重連續性去顫電擊(Doublesequential external Defibrillation,DSED)。操作步驟如下',
                                    '　1).需準備兩台電擊器，並依照圖示，一組貼片維持原本右上左下貼法，另外一組貼片使用前胸後背貼法。',
                                    '　2).依照現場狀況，讓兩台電擊器能夠同步進行分析，並且均顯示建議電擊狀態。',
                                    '　3).確認無人碰觸病人下,開始進行DSED,先進行右上左下電擊(如圖示:1A1B),再進行前胸後背電擊(如圖示2A2B),兩台電擊器電擊時,應有一秒鐘的時間差,以防止電擊器損壞。',
                                    'IMAGE:PIC/DSED.png',
                                    '註 4：',
                                    '1. 針對需要 CPR 之病人，搬運過程中應儘量減少胸部按壓中斷時間。',
                                    '2. 符合以下兩點可考慮準備架設自動心肺復甦機：',
                                    '　1). 現場救護技術員人力充足且不影響 CPR 品質。',
                                    '　2). 無胸、腹部明顯外傷、兒童及心肺復甦機各廠牌明訂之禁忌症。',
                                    '註 5：',
                                    '1. 救護車轉送醫院途間，應持續使用 AED 監測，同時每兩分鐘重新評估脈搏及心律。',
                                    '2. 到院前聯絡急救責任醫院。',
                                    '3. 非外傷的 OHCA 病人建議送往就近的急救責任醫院；外傷的 OHCA 傷患建議送往中度或重度急救責任醫院。',

                                   '註 2：急性肺水腫 (Acute Pulmonary Edema)：',
                                            '急性肺水腫（Acute Pulmonary Edema） 病人因為肺部積水而出現咳嗽及呼吸急促，當氣體交換越厲害病人會開始覺得有胸悶甚至覺得走路會喘、咳嗽出現紅色泡沫痰，最後病人可能連坐著都會喘而呈現「端坐呼吸」姿勢、臉色發紺。理學檢查可發現病人呈現明顯呼吸急促(可能有胸痛)，且合併咳嗽及帶有血絲的泡沫痰液、端坐呼吸、發紺、頸靜脈怒張、聽診有肺囉音、按壓下肢會出現凹陷性水腫等。',

                               '註 1：',
                                  ' 1.典型症狀為： 胸骨後(胸部正中)疼痛，疼痛感像是胸部受到擠壓一般，或者疼痛反射至下顎、脖子或左上臂。',
                                    ' 2.非典型症狀： 上腹痛、冒冷汗、噁心想吐、面色蒼白、口唇青紫、呼吸喘、短暫意識喪失，應考慮缺血性胸痛之可能。',

                                    '　1).缺血性胸痛發作時，除詢問過去病史，建議可輔以現病史（OPQRST 方式）詢問、配合理學檢查作為判斷。',
                                    '　2).現病史：',
                                    '　　(1).Onset/Origin：症狀的發生當時狀況。',
                                    '　　(2).Provoke/Palliation：有無加劇或緩解此一症狀的因素。',
                                    '　　(3).Quality：性質。',
                                    '　　(4).Region/Radiation：位置以及有無轉移。',
                                    '　　(5).Severity：嚴重度。',
                                    '　　(6).Time/Duration：持續時間與頻率。',
                                    '---------------------------------------------------------------------------',
                                    '※範例',
                                    '1.Onset/Origin：症狀的發生當時狀況。 什麼時候開始覺得胸痛? 剛發生胸痛時你在做什麼? 有沒有發生過類似的胸痛?',
                                             '2.Provoke/Palliation：有無加劇或緩解此一症狀的因素。 有沒有什麼姿勢會加重或是減輕你的肚子痛? 走路或者爬樓梯會不會引發你這樣的胸痛? 休息會不會讓胸痛改善?',
                                    '3.Quality：性質。 你可以形容一下是怎樣的不舒服嗎? 是悶悶的痛還是像刀在割? 這樣的痛是一陣一陣的還是一直持續?',
                                             '4.Region/Radiation：位置以及有無轉移。 你覺得疼痛的位置在哪裡? 疼痛的位置有沒有改變? 這樣的疼痛會不會傳到其他的部位?',
                                             '5.Severity：嚴重度。 你覺得有多痛? 如果疼痛的嚴重度從 1 分到 10 分，1 分代表最不痛，10 分代表最痛， 你覺得你現在的疼痛大約幾分?',
                                             '6.Time/Duration：持續時間與頻率。 每一次的疼痛約持續多久或多久痛 1 次?',
                                    '---------------------------------------------------------------------------',
                                    '若現病史無法完整獲得時，可依相關病史及症狀判斷是否為缺血性胸痛。下列情形傾向是缺血性胸痛的發作（依高度可能性至中度可能性）依序為：主訴胸痛、胸悶病人、併有已知有心肌梗塞(作過心導管或冠狀動脈繞道手術)病史、或呈現冒冷汗、或端坐呼吸（可能有一尖瓣逆流雜音、肺水腫及肺濕囉音等）、或年紀>70 歲之男性、或有糖尿病、或有抽菸史、或有其他血管病史（如腦中風過或週邊血管阻塞）。',
                                    '註 2：',
                                    '1.有以下情況時判定為不穩定狀態，應儘速就醫',
                                    '1).收縮壓<90mmHg。',
                                    '2).SpO2<90%(可先給予氧氣治療再評估)。',
                                    '3).急性意識改變。',
                                  '2.若不穩定但仍高度懷疑為急性冠心症，經病人或家屬同意後仍可執行 12 導程心電圖檢查，但需隨時注意生命徵象，執行後儘速送醫，送往有能力執行緊急心導管的急救責任醫院。',
                                    '3.將 12 導程心電圖檔案上傳至 Line 群組「到院前初步診斷 STEMI 判斷小組」，並無線電回報救災救護指揮中心，請當月輪值醫院於 Line 群組判讀。',
                                    '4.心電圖判讀小組輪值 1).奇數月（1、3、5、7、9 及 11 月）：成大醫院。 2).偶數月（2、4、6、8、10 及 12 月）：永康奇美醫院。',
                                    '5.心電圖判讀群組應於 1 分鐘內回覆內容，只要任 1 成員認為是疑似心肌梗塞病人，即確定後送具心導管室之急救責任醫院；心電圖判讀群組無回覆時，現場出勤人員就病人情況及病情急度判斷處置，並後送適當急救責任醫院。',
                                    '註 3：',

                                        '　2).脈搏：脈搏<50 次/分或>100 次/分。',
                                        '　3).用藥史：過去 24 小時之內曾服用威爾鋼、48 小時之內曾服用犀利士或類似藥物者。',
                                        '　4).過敏史：對 NTG 過敏者。',
                                        '　5).併發症：右心衰竭病人(若發現病人頸靜脈怒張，或下肢水腫，應注意可能為右心衰竭)',
                                      '2.中級以上救護技術員對於懷疑缺血性胸痛病人，若無禁忌症，可協助病人服用 NTG(1 片/SL)。每次一片，服用間隔應超過 5 分鐘，最多不超過 3 片(含病人已服用)，每次服用前均應測量血壓。',
                                    '註 4：',
                                      '1. 有配置 12 導程心電圖機之單位，受相關操作訓練至少 2 小時(1 次/年)之同仁，出勤遇有胸痛(悶)或初評、次評有反映胸痛(悶)之病人，得於救護現場接觸病人後至開車送醫前執行 12 導程心電圖；過程中若病人病況變化，應重新評估並給予相關治療，再視情況評估是否需執行 12 導程心電圖，或以其他合適流程接續處置。',
                                      '2.需詢問病人本人及家屬是否有接受 12 導程心電圖檢查意願，若有意願，應尊重病人隱私，選擇較隱密之空間施做。',
                                      '3.將 12 導程心電圖檔案上傳至 Line 群組「到院前初步診斷 STEMI 判斷小組」，並無線電回報救災救護指揮中心，請當月輪值醫院於 Line 群組判讀。',
                                      '4.心電圖判讀小組輪值 1).奇數月（1、3、5、7、9 及 11 月）：成大醫院。 2).偶數月（2、4、6、8、10 及 12 月）：永康奇美醫院。',
                                      '5.心電圖判讀群組應於 1 分鐘內回覆內容，只要任 1 成員認為是疑似心肌梗塞病人，即確定後送具心導管室之急救責任醫院；心電圖判讀群組無回覆時，現場出勤人員就病人情況及病情急度判斷處置，並後送適當急救責任醫院。',
                                    '註 5：',
                                      '1.本市可 24 小時執行緊急心導管之醫院： 1.柳營奇美醫院、奇美醫院、成大醫院、安南醫院、臺南市立醫院、台南新樓醫院、郭綜合醫院及麻豆新樓醫院。',
                                      '2.若 12 導程心電圖非 STEMI，但高度懷疑為急性冠心症之病人，仍建議送至有能力執行緊急心導管的急救責任醫院。',
                                    '註 6：',
                                      '1. 經心電圖判讀屬急性心肌梗塞者，若病人無 Aspirin 禁忌症者，[P]高級救護技術員可考慮給予口服 Aspirin(300mg/PO)；疑似主動脈剝離時，不可使用（病人主訴有突發性的撕裂般疼痛、前胸痛到背後、二側橈動脈可能不對稱，雙上肢或上下肢體血壓差≥20mmHg）。',
                                      '2. Aspirin 禁忌症包含下列情形：',
                                       '　1).對 Aspirin 或水楊酸類藥物過敏。',
                                       '　2).有貧血病史、凝血功能異常、或正在服用抗凝血劑。',

            {
                id: 'sec-4-others',

                keywords: ['肆', '其他', '相關', '原則', '流程'],
                isParent: true, 
                subItems: [

                    {

                        content: [

                    {

                        content: [

                    },
                    {
                        id: 'other-5',
                        title: 'AED檔案保存',
                        content: [

       // --- 元件：背景圖片 (修改：縮小50%並置中) ---
        const StarOfLifeBackground = () => (
            <div className="fixed inset-0 z-0 pointer-events-none flex items-center justify-center opacity-20 overflow-hidden">
                <img 
                    src="PIC/EMT.png" 
                    alt="背景圖" 
                    className="w-auto h-auto object-contain" 
                />
            </div>
        );

        // --- 元件：高亮文字 (HighlightText) ---
        const HighlightText = ({ text, highlight }) => {
            if (!highlight || !text) return <>{text}</>;

            // 使用正則表達式分割文字，保留搜尋詞
            const parts = text.split(new RegExp(`(${highlight})`, 'gi'));
            
            return (
                <>
                {parts.map((part, i) => 
                    part.toLowerCase() === highlight.toLowerCase() ? (
                    <span key={i} className="bg-yellow-300 text-black font-bold px-0.5 rounded-sm shadow-sm decoration-clone">
                        {part}
                    </span>
                    ) : (
                    part
                    )
                )}
                </>
            );
        };

        // --- 元件：指引卡片 ---
        const GuidelineCard = ({ item, isExpanded, toggleExpand, searchTerm }) => {
            const [expandedSubItems, setExpandedSubItems] = useState({});
            const [expandedGrandChildItems, setExpandedGrandChildItems] = useState({});

// 1. 新增這個函式：自動判斷要不要縮排
            const getContentClass = (text) => {
                // 正規表示式說明：
                // [0-9A-Za-z]+[\.]  -> 抓取 "數字" 或 "英文" 後面接 "點" (例如: 1. 或 A. 或 3.)
                // [\.\)、]          -> 包含點、半形右括號、頓號
                const listPattern = /^[\s　]*([0-9A-Za-z]+[\.\)、]|[\(（][0-9A-Za-z]+[\)）]|註[0-9]+[：:]|•|- )/;
                const isList = listPattern.test(text);
                
                // 基礎樣式：左右對齊、行高舒適
                let className = "block text-justify leading-relaxed "; 
                
                // 處理顏色 (如果有全形空白開頭，通常是縮排文字，顏色淡一點)
                if (text.startsWith('　')) {
                    className += "text-gray-500 ";
                } else {
                    className += "text-gray-700 ";
                }

                // ★ 這裡就是縮排的關鍵指令 ★
                if (isList) {
                    // pl-[2.2em]: 左側預留空間 (若標題數字很大如 100. 可改為 2.5em)
                    // indent-[-2.2em]: 第一行向左拉回，讓 "1." 凸出
                    // pl-[1.5em]: 左側預留空間 (原本是 2.2em，改小可縮短間距)
                    // indent-[-1.5em]: 第一行向左拉回 (數值需與 pl 相同，但為負數)
                    className += "pl-[1.0em] indent-[-1.0em]";
                } else if (text.startsWith('　')) {
                    // 純縮排文字
                    className += "pl-4";
                }

                return className;
            };

            // 監聽 searchTerm，自動展開匹配的項目
            useEffect(() => {
                if (searchTerm && item.subItems) {
                    const newExpandedSub = {};
                    const newExpandedGrand = {};
                    const lowerTerm = searchTerm.toLowerCase();

                    item.subItems.forEach(sub => {
                        let subMatch = false;
                        
                        // 1. 檢查子項目本身是否匹配
                        if (sub.title.toLowerCase().includes(lowerTerm)) subMatch = true;
                        if (sub.content && sub.content.some(c => c.toLowerCase().includes(lowerTerm))) subMatch = true;
                        
                        // 2. 檢查孫項目 (grandChildItems) 是否匹配
                        if (sub.grandChildItems) {
                            sub.grandChildItems.forEach(gc => {
                                let gcMatch = false;
                                if (gc.title.toLowerCase().includes(lowerTerm)) gcMatch = true;
                                if (gc.code && gc.code.toLowerCase().includes(lowerTerm)) gcMatch = true;
                                if (gc.content && gc.content.some(c => c.toLowerCase().includes(lowerTerm))) gcMatch = true;

                                if (gcMatch) {
                                    newExpandedGrand[gc.id] = true;
                                    subMatch = true; // 如果孫項目匹配，父層子項目也必須展開
                                }
                            });
                        }
                        
                        if (subMatch) {
                            newExpandedSub[sub.id] = true;
                        }
                    });

                    setExpandedSubItems(newExpandedSub);
                    setExpandedGrandChildItems(newExpandedGrand);
                } else if (!searchTerm) {
                    // 清除搜尋時，可選擇是否重置，這裡選擇重置以避免版面混亂
                    setExpandedSubItems({});
                    setExpandedGrandChildItems({});
                }
            }, [searchTerm, item]);

            const toggleSubItem = (subId, e) => {
                e.stopPropagation();
                setExpandedSubItems(prev => ({ ...prev, [subId]: !prev[subId] }));
            };

            const toggleGrandChildItem = (grandChildId, e) => {
                e.stopPropagation();
                setExpandedGrandChildItems(prev => ({ ...prev, [grandChildId]: !prev[grandChildId] }));
            };

            const getIcon = (code) => {
                if (code === 'Law') return 'gavel';
                if (code === 'Procedure') return 'file-text'; 
                if (code.startsWith('C') || code.startsWith('S')) return 'shield';
                if (code.startsWith('M')) return 'stethoscope';
                if (code.startsWith('T')) return 'alert-circle';
                return 'activity';
            };

            const getTagColor = (code) => {
                if (code === 'Law') return 'bg-amber-100 text-amber-800 border-amber-200';
                if (code === 'Procedure') return 'bg-orange-100 text-orange-800 border-orange-200'; 
                if (code.startsWith('C')) return 'bg-gray-100 text-gray-700 border-gray-200';
                if (code.startsWith('M')) return 'bg-green-50 text-green-700 border-green-200';
                if (code.startsWith('T')) return 'bg-red-50 text-red-700 border-red-200';
                if (code.startsWith('S')) return 'bg-purple-50 text-purple-700 border-purple-200';
                return 'bg-blue-50 text-blue-700 border-blue-200';
            };

            // Parent Item (貳、參、肆)
            if (item.isParent) {
                return (
                    <div className={`relative z-10 mb-3 overflow-hidden rounded-xl border transition-all duration-300 ${isExpanded ? 'border-orange-400 shadow-md bg-white ring-1 ring-orange-100' : 'border-slate-200 bg-white/95 hover:bg-white shadow-sm'}`}>
                        <button onClick={toggleExpand} className="flex w-full items-center justify-between p-4 text-left focus:outline-none">
                            <div className="flex items-center gap-3">
                                <div className={`flex h-10 w-10 shrink-0 items-center justify-center rounded-full ${isExpanded ? 'bg-orange-600 text-white' : 'bg-orange-100 text-orange-600'}`}>
                                    <Icon name={getIcon(item.code)} size={20} />
                                </div>
                                <div>
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className={`px-2 py-0.5 text-xs font-bold rounded border ${getTagColor(item.code)}`}>
                                            <HighlightText text={item.category.split('、')[0]} highlight={searchTerm} />
                                        </span>
                                        <span className="text-xs font-medium text-gray-500">
                                            <HighlightText text={item.category} highlight={searchTerm} />
                                        </span>
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 leading-tight">
                                        <HighlightText text={item.title} highlight={searchTerm} />
                                    </h3>
                                </div>
                            </div>
                            {isExpanded ? <Icon name="chevron-up" className="text-orange-500 shrink-0 ml-2" /> : <Icon name="chevron-down" className="text-gray-400 shrink-0 ml-2" />}
                        </button>

                        <div className={`overflow-hidden transition-all duration-300 ease-in-out ${isExpanded ? 'max-h-[30000px] opacity-100' : 'max-h-0 opacity-0'}`}>
                            <div className="border-t border-gray-100 bg-orange-50/30 p-2 md:p-4 space-y-2">
                                {item.subItems.map((subItem) => (
                                    <div key={subItem.id} className="border border-orange-200 rounded-lg bg-white overflow-hidden">
                                        <button onClick={(e) => toggleSubItem(subItem.id, e)} className="flex w-full items-center justify-between p-3 text-left hover:bg-orange-50/50 transition-colors">
                                            <div className="flex items-center gap-2">
                                                <div className="h-1.5 w-1.5 rounded-full bg-orange-400 shrink-0"></div>
                                                <span className="font-medium text-gray-700">
                                                    <HighlightText text={subItem.title} highlight={searchTerm} />
                                                </span>
                                            </div>
                                            {expandedSubItems[subItem.id] ? <Icon name="minus" size={16} className="text-orange-400" /> : <Icon name="plus" size={16} className="text-gray-400" />}
                                        </button>

                                        <div className={`overflow-hidden transition-all duration-300 ${expandedSubItems[subItem.id] ? 'max-h-[20000px] opacity-100 border-t border-orange-100' : 'max-h-0 opacity-0'}`}>
                                            
                                            {/* 1. 先顯示文字內容 (Content) 與 圖片 (Image) */}
                                            {((subItem.content && subItem.content.length > 0) || subItem.image) && (
                                                <div className={`p-4 bg-gray-50 text-base text-gray-800 ${subItem.alignment === 'center' ? 'text-center' : 'text-left'} ${subItem.scrollable ? 'max-h-64 overflow-y-auto custom-scrollbar' : ''}`}>
                                                    {subItem.type === 'text' ? (
                                                        <div className="space-y-4 leading-relaxed">
                                                            {subItem.content.map((para, idx) => (
                                                                <div key={idx} className={getContentClass(para)}><HighlightText text={para} highlight={searchTerm} />
                                                                 </div>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <ol className="list-decimal ml-5 space-y-1">
                                                            {subItem.content.map((c, idx) => (
                                                                <li key={idx}><HighlightText text={c} highlight={searchTerm} /></li>
                                                            ))}
                                                        </ol>
                                                    )}
                                                    
                                                    {/* 1.5. 顯示圖片 */}
                                                    {subItem.image && (
                                                        <div className="mt-4 w-full">
                                                            <ZoomableImage src={subItem.image} alt="illustration" className="w-full h-auto object-contain border border-gray-200 rounded bg-white" />
                                                        </div>
                                                    )}

                                                    {subItem.note && <div className="mt-2 text-xs text-orange-600 bg-orange-50 p-2 rounded">註: {subItem.note}</div>}
                                                </div>
                                            )}

                                            {/* 2. 再顯示子選單 (GrandChild Items) */}
                                            {subItem.grandChildItems && (
                                                <div className="p-2 bg-gray-50 space-y-2 border-t border-gray-100">
                                                    {subItem.grandChildItems.map((grandChild) => (
                                                        <div key={grandChild.id} className="border border-gray-200 rounded bg-white">
                                                            <button onClick={(e) => toggleGrandChildItem(grandChild.id, e)} className="flex w-full items-center justify-between p-3 text-left hover:bg-blue-50 transition-colors">
                                                                <div className="flex items-center gap-2">
                                                                    <span className="bg-gray-100 text-gray-600 text-xs px-1.5 py-0.5 rounded border border-gray-200 font-mono">{grandChild.code}</span>
                                                                    <span className="text-sm font-medium text-gray-800">
                                                                        <HighlightText text={grandChild.title} highlight={searchTerm} />
                                                                    </span>
                                                                </div>
                                                                {expandedGrandChildItems[grandChild.id] ? <Icon name="chevron-up" size={14} className="text-blue-500" /> : <Icon name="chevron-down" size={14} className="text-gray-400" />}
                                                            </button>
                                                            
                                                            <div className={`overflow-hidden transition-all duration-300 ${expandedGrandChildItems[grandChild.id] ? 'max-h-[10000px] opacity-100 border-t border-gray-100' : 'max-h-0 opacity-0'}`}>
                                                                <div className="p-3 bg-slate-50 text-sm text-gray-600">
                                                                    
                                                                    {/* 1. ===圖片顯示:1=== (移至文字上方) */}
                                                                    {grandChild.image && (
                                                                        <div className="mb-4 w-full">
                                                                            <ZoomableImage src={grandChild.image} alt={grandChild.title} className="w-full h-auto object-contain border border-gray-200 rounded" />
                                                                        </div>
                                                                    )}
                                                                     {grandChild.image2 && (
                                                                            <div className="mb-4 w-full">
                                                                             <ZoomableImage src={grandChild.image2} alt={grandChild.title} className="w-full h-auto object-contain border border-gray-200 rounded" />
                                                                         </div>
)}
                                                               
                                                                    {/* 2. */}
                                                                    {grandChild.content.length > 0 ? (
                                                                        /* 針對 C1-C6, M1-M14, T1-T7, S1-S10, 不使用 ol list-decimal，改用 div 呈現以避免重複編號 */
                                                                        <div className="space-y-2 text-justify">
                                                                            {grandChild.content.map((c, idx) => {
                                                                                  if (c.startsWith('IMAGE:')) {
                                                                               const imgSrc = c.replace('IMAGE:', '');
                                                                               return (
                                                                              <div key={idx} className="w-full flex justify-center my-3">
                                                                             <ZoomableImage 
                                                                                        src={imgSrc} 
                                                                                        alt="流程圖示" 
                                                                className="max-w-full h-auto object-contain border border-gray-200 rounded" 
                                                                                          />
                                                                             </div>
                                                                                          );
                                                                                }
                                                                                return (
                                                                                 // 改成這樣，才會去執行您上面寫好的正則表達式判斷
                                                                                                   <div key={idx} className={getContentClass(c)}>
                                                                                                    <HighlightText text={c} highlight={searchTerm} />
                                                                                </div>
                                                                                  );
                                                                            })}
                                                                        </div>
                                                                    ) : (
                                                                        !grandChild.image && <p className="italic text-gray-400 pl-2">內容待補...</p>
                                                                    )}

                                                                    {grandChild.note && (
                                                                        <div className="mt-2 text-xs text-amber-700 bg-amber-50 p-2 rounded border border-amber-100 flex gap-1">
                                                                            <Icon name="info" size={14} className="shrink-0 mt-0.5" />
                                                                            <div><span className="font-bold">注意：</span><HighlightText text={grandChild.note} highlight={searchTerm} /></div>
                                                                        </div>
                                                                    )}
                                                                    {/* 2.5 底部圖片顯示 (新增功能) */}
                                                                    {grandChild.bottomImage && (
                                                                     <div className="mt-4 w-full flex justify-center"> {/* 修改A: 加入 flex justify-center 讓圖片置中 */}
                                                                      <ZoomableImage 
                                                                          src={grandChild.bottomImage} 
                                                                          alt={grandChild.title} 
                                                                          /* 修改B: 將 w-full 改為 max-w-full */
                                                                          className="max-w-full h-auto object-contain border border-gray-200 rounded" 
                                                                                                                                                  />
                                                                          </div>
                                                                       )}
                                                                      {/* === 這裡是您要新增的第二張圖片程式碼 === */}
                                                                      {grandChild.bottomImage2 && (
                                                                      <div className="mt-4 w-full flex justify-center"> {/* 修改A: 加入 flex justify-center 讓圖片置中 */}

                                                                       <ZoomableImage 
                                                                       src={grandChild.bottomImage2} 
                                                                       alt={grandChild.title} 
                                                                       className="max-w-full h-auto object-contain border border-gray-200 rounded" 
                                                                                                                                                                                                                                                                                                                                                  />
                                                                                                                                                                            </div>
                                                                                                                                                                      )}
                                                                                                                                                                  {/* ======================================= */}
                                                                       {grandChild.note && (
                                                                       <div className="mt-2 text-xs text-amber-700 bg-amber-50 p-2 rounded border border-amber-100 flex gap-1">
<Icon name="info" size={14} className="shrink-0 mt-0.5" />
        <div><span className="font-bold">注意：</span><HighlightText text={grandChild.note} highlight={searchTerm} /></div>
    </div>
)}
                                                                    {/* === NEW: 第三層收起按鈕 (Level 3) === */}
                                                                    <button 
                                                                        onClick={(e) => toggleGrandChildItem(grandChild.id, e)}
                                                                        className="w-full mt-3 flex items-center justify-center gap-2 py-2 bg-white hover:bg-slate-100 border border-slate-200 text-slate-500 hover:text-slate-700 text-xs font-medium transition-colors rounded-lg"
                                                                    >
                                                                        <Icon name="chevron-up" size={12} />
                                                                        <span>收起「{grandChild.title}」</span>
                                                                    </button>

                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                            
                                            {/* 3. 若兩者皆無則顯示待補 */}
                                            {(!subItem.content || subItem.content.length === 0) && !subItem.grandChildItems && !subItem.image && (
                                                <div className="p-4 bg-gray-50 text-sm text-gray-400 italic pl-2">內容待補...</div>
                                            )}

                                            {/* 子目錄底部的收起按鈕 (Level 2) */}
                                            <button 
                                                onClick={(e) => toggleSubItem(subItem.id, e)}
                                                className="w-full flex items-center justify-center gap-2 py-2.5 bg-gray-50 hover:bg-gray-100 border-t border-gray-100 text-gray-500 hover:text-gray-700 text-xs font-medium transition-colors"
                                            >
                                                <Icon name="chevron-up" size={14} />
                                                <span>收起「{subItem.title}」</span>
                                            </button>
                                        </div>
                                    </div>
                                ))}

                                {/* 大目錄底部的收起按鈕 (Level 1) */}
                                <button 
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        toggleExpand();
                                    }}
                                    className="w-full mt-2 flex items-center justify-center gap-2 py-3 text-sm font-medium text-orange-700 bg-orange-50/50 hover:bg-orange-100 rounded-lg border border-dashed border-orange-300 transition-all"
                                >
                                    <Icon name="chevron-up" size={16} />
                                    <span>收起「{item.category.split('、')[0]}」目錄 (回到縮起狀態)</span>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Standard Item
            return (
                <div className={`relative z-10 mb-3 overflow-hidden rounded-xl border transition-all duration-300 ${isExpanded ? 'border-blue-500 shadow-md bg-white ring-1 ring-blue-200' : 'border-slate-200 bg-white/95 hover:bg-white shadow-sm'}`}>
                    <button onClick={toggleExpand} className="flex w-full items-center justify-between p-4 text-left focus:outline-none">
                        <div className="flex items-center gap-3">
                            <div className={`flex h-10 w-10 shrink-0 items-center justify-center rounded-full ${isExpanded ? 'bg-blue-600 text-white' : 'bg-blue-100 text-blue-600'}`}>
                                <Icon name={getIcon(item.code)} size={20} />
                            </div>
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className={`px-2 py-0.5 text-xs font-bold rounded border ${getTagColor(item.code)}`}>
                                        <HighlightText text={item.code === 'Law' ? '壹、依據' : item.code} highlight={searchTerm} />
                                    </span>
                                    <span className="text-xs font-medium text-gray-500">
                                        <HighlightText text={item.category} highlight={searchTerm} />
                                    </span>
                                </div>
                                <h3 className="text-lg font-bold text-gray-800 leading-tight">
                                    <HighlightText text={item.title} highlight={searchTerm} />
                                </h3>
                            </div>
                        </div>
                        {isExpanded ? <Icon name="chevron-up" className="text-blue-500 shrink-0 ml-2" /> : <Icon name="chevron-down" className="text-gray-400 shrink-0 ml-2" />}
                    </button>

                    <div className={`overflow-hidden transition-all duration-300 ease-in-out ${isExpanded ? 'max-h-[1500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                        <div className="border-t border-gray-100 bg-slate-50/80 p-4">
                            {item.code === 'Law' ? (
                                <div className="space-y-4 text-gray-700 leading-relaxed text-justify px-2">
                                    {item.content.map((para, idx) => (
                                        <p key={idx} className="indent-8 font-serif text-lg"><HighlightText text={para} highlight={searchTerm} /></p>
                                    ))}
                                </div>
                            ) : (
                                <ol className="ml-5 list-decimal space-y-3 text-gray-700">
                                    {item.content.length > 0 ? (
                                        item.content.map((step, idx) => (
                                            <li key={idx} className="pl-1 leading-relaxed"><HighlightText text={step} highlight={searchTerm} /></li>
                                        ))
                                    ) : (
                                        <li className="pl-1 leading-relaxed text-gray-400 italic">內容待補</li>
                                    )}
                                </ol>
                            )}
                            {item.note && (
                                <div className="mt-4 flex gap-2 rounded-lg bg-amber-50 p-3 text-sm text-amber-800 border border-amber-200">
                                    <Icon name="info" size={18} className="shrink-0 mt-0.5 text-amber-600" />
                                    <div>
                                        <strong className="block mb-1 text-amber-900">注意事項：</strong>
                                        <HighlightText text={item.note} highlight={searchTerm} />
                                    </div>
                                </div>
                            )}

                            {/* 標準項目底部的收起按鈕 */}
                            <button 
                                onClick={(e) => {
                                    e.stopPropagation();
                                    toggleExpand();
                                }}
                                className="w-full mt-4 flex items-center justify-center gap-2 py-2 text-sm font-medium text-blue-600 bg-blue-50/50 hover:bg-blue-100 rounded-lg border border-dashed border-blue-200 transition-all"
                            >
                                <Icon name="chevron-up" size={16} />
                                <span>收起</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const PrefaceModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-blue-950/60 backdrop-blur-sm transition-opacity" onClick={onClose} />
                    <div className="relative z-10 w-full max-w-2xl max-h-[85vh] overflow-y-auto rounded-2xl bg-white shadow-2xl animate-fade-in-up">
                        <button onClick={onClose} className="absolute top-4 right-4 rounded-full bg-gray-100 p-2 text-gray-500 hover:bg-gray-200 transition-colors"><Icon name="x" size={20} /></button>
                        <div className="p-8 md:p-10">
                            <div className="mb-8 text-center border-b pb-4 border-gray-100">
                                <h2 className="text-3xl font-bold text-blue-900 tracking-wider">書序</h2>
                                <p className="text-sm text-gray-500 mt-2">Bureau Director's Preface</p>
                            </div>
                            <div className="space-y-6 text-gray-700 leading-relaxed text-justify text-lg font-serif">
                                <p className="indent-8">隨著時代進步與醫療科技的發展，緊急救護的標準與技術也不斷演進。院前緊急救護是守護市民生命安全的重要環節，臺南市政府消防局始終秉持「專業、精進、服務」的精神，持續提升救護品質，精進人員技能，以確保傷病患在黃金救命時間內獲得最適切的處置。</p>
                                <p className="indent-8">本局自推動高級救護技術以來，積極培訓專業人員，至今高級救護技術員 (EMT-P) 比例已由103年的15.6%提升至18.7%，確保各分隊皆有足夠高級救護人員執行高級救命術 (ALS)，大幅提升本市院前救護的整體水準。而為了使本局救護人員能夠與時俱進、精準執行救護技術，我們特別編纂本書《到院前各級救護技術員緊急救護操作指引》，作為第一線救護人員的實務參考。</p>
                                <p className="indent-8">本書內容由本局緊急救護教官群在醫療指導醫師的專業指導下共同編撰，依據最新的國際救護指引，結合本市救護經驗，詳盡整理各級救護技術員應具備的技能與標準操作程序，務求讓每一位救護人員皆能熟練應用，確保執勤時能提供最優質的院前急救服務。</p>
                                <p className="indent-8">救護工作是一場與時間競賽的使命，而專業的技術與標準化的作業流程，正是守護生命最堅實的後盾。期待本書能成為各級救護技術員的實務指南，進一步提升臺南市院前緊急救護的效能，為市民帶來更安全、更完善的緊急醫療服務。</p>
                            </div>
                            <div className="mt-12 flex flex-col items-end gap-2 text-right">
                                <p className="text-xl font-bold text-blue-900">臺南市政府消防局局長</p>
                                <div className="py-2">
                                    <img src="PIC/Director.png" alt="局長李明峯簽名" className="h-20 w-auto object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.parentElement.innerHTML += '<div class="text-3xl font-serif font-black tracking-widest text-gray-800 py-2 border-b-2 border-red-500">李明峯</div>'; }} />
                                </div>
                                <p className="text-sm text-gray-500 mt-2">中華民國114年6月</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AuthorModal = ({ isOpen, onClose }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-blue-950/60 backdrop-blur-sm transition-opacity" onClick={onClose} />
                    <div className="relative z-10 w-full max-w-lg max-h-[85vh] overflow-y-auto rounded-2xl bg-white shadow-2xl animate-fade-in-up">
                        <button onClick={onClose} className="absolute top-4 right-4 rounded-full bg-gray-100 p-2 text-gray-500 hover:bg-gray-200 transition-colors"><Icon name="x" size={20} /></button>
                        <div className="p-8">
                            <div className="mb-6 text-center border-b pb-4 border-gray-100">
                                <h2 className="text-2xl font-bold text-blue-900 tracking-wider">作者群</h2>
                                <p className="text-sm text-gray-500 mt-1">Editorial Committee</p>
                            </div>
                            <div className="space-y-6 text-gray-700">
                                <div><h3 className="text-lg font-bold text-gray-800 mb-2">臺南市政府消防局各級救護技術員到院前緊急救護作業參考指引</h3></div>
                                <div className="text-sm space-y-2">
                                    <p><span className="font-bold">出版單位：</span>臺南市政府消防局</p>
                                    <p><span className="font-bold">召集人：</span>李明峯</p>
                                    <p><span className="font-bold">副召集人：</span>李政昌、楊宗林、丁春能</p>
                                    <p><span className="font-bold">總編輯：</span>臺南市政府消防局緊急醫療指導醫師暨醫療顧問團</p>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                        <h4 className="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1">主編</h4>
                                        <p className="text-gray-700 text-sm">林毅、陳冠傑、張鴻傑、蔡長志、顏維廷、蘇士雄</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                                        <h4 className="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-1">編輯</h4>
                                        <div className="text-sm text-gray-700 leading-relaxed">王健宇、李鎮宇、李穎勳、李致穎、李俊信、邱建銘、吳青翰、吳晨瑋、沈宥延、邱柏惟、林弘瑋、林威廷、陳信義、陳鵬文、陳怡娟、陳怡婕、陳世欽、黃振彬、黃國典、黃冠庭、蔡承翰、蘇士哲</div>
                                    </div>
                                    <div className="text-sm space-y-1 mt-2">
                                        <p><span className="font-bold">地址：</span>臺南市安平區永華路二段 898 號</p>
                                        <p><span className="font-bold">電話：</span>(06)-297-5119</p>
                                        <p><span className="font-bold">網址：</span>119.tainan.gov.tw</p>
                                        <p><span className="font-bold">出版日期：</span>2025 年 月 日</p>
                                    </div>
                                    <div className="text-center text-xs text-gray-400 mt-4"><p>臺南市政府消防局 版權所有</p><p>Copyright © 2025 Tainan City Fire Bureau.</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [searchTerm, setSearchTerm] = useState('');
            const [expandedId, setExpandedId] = useState(null);
            const [showPreface, setShowPreface] = useState(false);
            const [showAuthors, setShowAuthors] = useState(false);
            
            // --- 新增：字體大小狀態 (預設 1 = 100%) ---
            const [fontScale, setFontScale] = useState(1);

            // --- 新增：監聽 fontScale 並調整根元素字體大小 ---
            // Tailwind 的 text-sm, text-lg 等皆使用 rem 單位，調整 html fontSize 即可等比縮放
            useEffect(() => {
                const baseSize = 100; // 瀏覽器預設通常為 16px = 100%
                document.documentElement.style.fontSize = `${baseSize * fontScale}%`;
            }, [fontScale]);

            // --- 新增：字體調整處理函式 ---
            const handleZoomIn = () => setFontScale(prev => Math.min(prev + 0.05, 1.25)); // 最大放大至 125%
            const handleZoomOut = () => setFontScale(prev => Math.max(prev - 0.05, 0.9));  // 最小縮小至 90%
            const handleResetZoom = () => setFontScale(1);

            const filteredData = useMemo(() => {
                if (!searchTerm) return guidelinesData;
                const lowerTerm = searchTerm.toLowerCase();
                return guidelinesData.filter(item => 
                    item.title.toLowerCase().includes(lowerTerm) ||
                    item.code.toLowerCase().includes(lowerTerm) ||
                    item.keywords.some(k => k.toLowerCase().includes(lowerTerm)) ||
                    (item.content && item.content.some(c => c.toLowerCase().includes(lowerTerm))) || 
                    (item.subItems && item.subItems.some(sub => 
                        sub.title.toLowerCase().includes(lowerTerm) || 
                        (sub.grandChildItems && sub.grandChildItems.some(gc => gc.title.toLowerCase().includes(lowerTerm) || gc.content.some(c => c.toLowerCase().includes(lowerTerm))))
                    ))
                );
            }, [searchTerm]);

            const handleToggle = (id) => {
                setExpandedId(prev => prev === id ? null : id);
            };

            return (
                <div className="min-h-screen bg-slate-100 font-sans text-gray-900 selection:bg-blue-200">
                    <StarOfLifeBackground />
                    <PrefaceModal isOpen={showPreface} onClose={() => setShowPreface(false)} />
                    <AuthorModal isOpen={showAuthors} onClose={() => setShowAuthors(false)} />

                    {/* ↓↓↓ 請在此處補上這一行 ↓↓↓ */}
                    <FontSizeControl />
                    {/* ↑↑↑ 補上後右下角按鈕即會出現 ↑↑↑ */}                    

                    {/* ... (Header 區域程式碼保持不變) ... */}
                    <header className="sticky top-0 z-50 bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-lg">
                        <div className="mx-auto max-w-4xl px-4 py-3">
                             <div className="flex flex-wrap items-center justify-between gap-y-3 gap-x-4">
                                {/* Logo 與 標題區域 */}
                                <div className="flex items-center gap-3 shrink-0 order-1">
                                    <div className="relative flex h-10 w-10 items-center justify-center rounded-full bg-white text-blue-900 shadow-md border-2 border-blue-200 overflow-hidden">
                                        <img src="PIC/119.png" alt="Logo" className="w-full h-full object-cover" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-wide leading-none">臺南市政府消防局</h1>
                                        <p className="text-xs text-blue-200 font-medium tracking-wider">緊急救護指引 (114年版)</p>
                                    </div>
                                </div>

                                {/* 按鈕區域 (手機版: Order 2, 電腦版: Order 3) */}
                                <div className="flex flex-row md:flex-col items-center md:items-end gap-2 shrink-0 order-2 md:order-3 ml-auto md:ml-0">
                                    <button onClick={() => setShowPreface(true)} className="flex items-center gap-1.5 rounded-lg bg-blue-700/50 px-3 py-1.5 text-xs font-medium text-white hover:bg-blue-600/80 transition-all border border-blue-400/30 backdrop-blur-sm">
                                        <Icon name="book-open" size={14} /><span>書序</span>
                                    </button>
                                    <button onClick={() => setShowAuthors(true)} className="flex items-center gap-1.5 rounded-lg bg-blue-700/50 px-3 py-1.5 text-xs font-medium text-white hover:bg-blue-600/80 transition-all border border-blue-400/30 backdrop-blur-sm">
                                        <Icon name="users" size={14} /><span>作者群</span>
                                    </button>
                                </div>

                                {/* 搜尋框區域 (手機版: Order 3, 電腦版: Order 2) */}
                                <div className="relative flex-1 min-w-[100%] md:min-w-[260px] order-3 md:order-2">
                                    <input 
                                        type="text" 
                                        placeholder="搜尋代碼 (C1, M7...), 症狀或關鍵字..." 
                                        value={searchTerm} 
                                        onChange={(e) => setSearchTerm(e.target.value)} 
                                        className="w-full rounded-xl border-none bg-blue-950/40 py-2.5 pl-10 pr-10 text-white placeholder-blue-300/70 outline-none ring-1 ring-blue-400/30 backdrop-blur-sm focus:bg-blue-950/60 focus:ring-2 focus:ring-blue-300/50 transition-all shadow-inner text-sm" 
                                    />
                                    <Icon name="search" className="absolute left-3 top-2.5 h-5 w-5 text-blue-300" />
                                    {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-3 top-2.5 rounded-full bg-blue-900/50 p-0.5 text-blue-200 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" /></svg></button>}
                                </div>
                            </div>
                        </div>
                    </header>
                    <main className="relative mx-auto max-w-3xl px-4 py-6 pb-24">
                        <div className="mb-4 flex items-center justify-between px-1 text-sm text-gray-500 font-medium">
                            <span>指引總數: {guidelinesData.length}</span>
                            {searchTerm && <span className="text-blue-600">搜尋結果: {filteredData.length} 筆</span>}
                        </div>
                        <div className="space-y-3">
                            {filteredData.length > 0 ? (
                                filteredData.map(item => (
                                    <GuidelineCard 
                                        key={item.id} 
                                        item={item} 
                                        isExpanded={searchTerm ? true : expandedId === item.id} 
                                        toggleExpand={() => handleToggle(item.id)} 
                                        searchTerm={searchTerm} 
                                    />
                                ))
                            ) : (
                                <div className="flex flex-col items-center justify-center py-16 text-center text-gray-400">
                                    <div className="rounded-full bg-gray-200 p-4 mb-3"><Icon name="search" size={32} className="text-gray-400" /></div>
                                    <p className="text-lg font-medium text-gray-600">找不到符合的指引</p>
                                    <p className="text-sm mb-4">請嘗試搜尋 "CPR", "骨折", "M7" 等關鍵字</p>
                                    <button onClick={() => setSearchTerm('')} className="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 transition-colors shadow-sm">清除搜尋</button>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
